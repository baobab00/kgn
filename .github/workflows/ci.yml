# KGN CI — lint + test + coverage gate
#
# Triggers on push to master/main/dev and on pull requests to master/main.
# Uses PostgreSQL 16 + pgvector as a service container for integration tests.

name: CI

on:
  push:
    branches: [master, main, dev]
    tags: ["v*"]
  pull_request:
    branches: [master, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # ── DB config for tests ──────────────────────────────────────────
  KGN_DB_HOST: localhost
  KGN_DB_PORT: "5432"
  KGN_DB_NAME: kgn_test
  KGN_DB_USER: kgn
  KGN_DB_PASSWORD: kgn_ci_password
  # Prevent factory from picking up stale keys
  KGN_OPENAI_API_KEY: ""

jobs:
  # ── Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format
        run: uv run ruff format --check .

  # ── Test ───────────────────────────────────────────────────────────
  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python: ["3.12"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: kgn_test
          POSTGRES_USER: kgn
          POSTGRES_PASSWORD: kgn_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kgn -d kgn_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: uv sync --dev --extra lsp --extra web --extra openai

      - name: Configure git identity for tests
        run: |
          git config --global user.email "ci@example.com"
          git config --global user.name "CI"

      - name: Run tests with coverage
        run: >-
          uv run pytest
          --tb=short -q
          --cov=kgn
          --cov-report=term-missing
          --cov-report=xml:coverage.xml
          --cov-fail-under=90

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python }}
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Coverage gate (backup; primary gate is --cov-fail-under in test job) ──
  coverage-gate:
    name: Coverage ≥ 90% (backup)
    runs-on: ubuntu-latest
    needs: test
    continue-on-error: true

    steps:
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-py3.12

      - name: Verify coverage ≥ 90%
        run: |
          python3 -c "import xml.etree.ElementTree as ET, sys; tree = ET.parse('coverage.xml'); rate = float(tree.getroot().attrib['line-rate']) * 100; print(f'Line coverage: {rate:.1f}%'); sys.exit(0 if rate >= 90 else 1)"

  # ── Build ──────────────────────────────────────────────────────────
  build:
    name: Build (wheel + sdist)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build wheel & sdist
        run: uv build

      - name: Verify wheel contents
        run: |
          python3 -c "import zipfile, glob, sys; whl = glob.glob('dist/*.whl')[0]; z = zipfile.ZipFile(whl); sqls = [n for n in z.namelist() if n.endswith('.sql')]; print(f'SQL files in wheel: {len(sqls)}'); [print(f'  {s}') for s in sorted(sqls)]; sys.exit(0 if len(sqls) >= 6 else 1)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ── Publish to PyPI (on tag push only) ─────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
