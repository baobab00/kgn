# KGN Publish — Build & upload to PyPI on release
#
# Triggered when a GitHub Release is published (manually or via tag).
# Uses PyPI Trusted Publisher (OIDC) — no API tokens needed.
# Configure at: https://pypi.org/manage/project/kgn/settings/publishing/

name: Publish to PyPI

on:
  release:
    types: [published]

  # Manual trigger for testing the workflow
  workflow_dispatch:
    inputs:
      target:
        description: "Upload target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build ────────────────────────────────────────────────────────
  build:
    name: Build wheel & sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build
        run: uv build

      - name: Verify wheel contents
        run: |
          python3 << 'PYEOF'
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          z = zipfile.ZipFile(whl)
          sqls = [n for n in z.namelist() if n.endswith('.sql')]
          print(f'SQL files in wheel: {len(sqls)}')
          [print(f'  {s}') for s in sorted(sqls)]
          sys.exit(0 if len(sqls) >= 6 else 1)
          PYEOF

      - name: Verify version matches tag
        if: github.event_name == 'release'
        run: |
          python3 << 'PYEOF'
          import zipfile, glob, sys
          whl = glob.glob('dist/*.whl')[0]
          z = zipfile.ZipFile(whl)
          meta = [n for n in z.namelist() if n.endswith('METADATA')][0]
          lines = z.read(meta).decode().splitlines()
          ver = [l.split(': ',1)[1] for l in lines if l.startswith('Version: ')][0]
          tag = '${{ github.event.release.tag_name }}'.lstrip('v')
          print(f'Wheel version: {ver}')
          print(f'Tag version:   {tag}')
          if ver != tag:
              print('ERROR: version mismatch!')
              sys.exit(1)
          print('OK: versions match')
          PYEOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  # ── Publish to PyPI (on release) ─────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    environment:
      name: pypi
      url: https://pypi.org/project/kgn/

    permissions:
      id-token: write  # Required for OIDC Trusted Publisher

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          skip-existing: true

  # ── Publish to TestPyPI (manual dispatch) ────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/project/kgn/

    permissions:
      id-token: write  # Required for OIDC Trusted Publisher

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          print-hash: true
          skip-existing: true

  # ── Publish to PyPI (manual dispatch) ────────────────────────────
  publish-pypi-manual:
    name: Publish to PyPI (manual)
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi'
    environment:
      name: pypi
      url: https://pypi.org/project/kgn/

    permissions:
      id-token: write

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
          skip-existing: true
