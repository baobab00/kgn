name: "\U0001F41B Bug Report"
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
        Please fill out the sections below to help us reproduce and fix the issue.

  - type: input
    id: version
    attributes:
      label: KGN Version
      description: "Run `kgn --version` to find out"
      placeholder: "e.g. 0.11.0"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of KGN is affected?
      options:
        - CLI (kgn command)
        - MCP Server
        - Ingest / Parser
        - Query / Subgraph
        - Embedding / Similarity
        - Task Queue / Orchestration
        - Conflict Detection
        - Git / GitHub Sync
        - Web Dashboard
        - VS Code Extension (LSP)
        - Database / Migrations
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I run `kgn ingest ...`, it fails with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this behavior?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or logs if possible.
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux (Ubuntu)
        - Linux (Other)
        - Docker
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: "e.g. 3.12.4"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any additional context, screenshots, or logs.
