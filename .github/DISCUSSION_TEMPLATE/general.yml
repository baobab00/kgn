title: "General Discussion"
labels: []
body:
  - type: markdown
    attributes:
      value: |
        👋 Welcome! Use this space for general discussions about KGN.
  - type: textarea
    id: topic
    attributes:
      label: Topic
      description: What would you like to discuss?
      placeholder: Describe your topic...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any extra context, links, or references.
      placeholder: Optional additional details...
    validations:
      required: false
